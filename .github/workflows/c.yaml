name: C

on:
  pull_request:
    paths:
      - c/**
      - .github/workflows/c.yaml
  push:
    branches:
      - "**"
    paths:
      - c/**
      - .github/workflows/c.yaml

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: c

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Mise
        uses: jdx/mise-action@v4
        with:
          working_directory: c

      - name: Setup Xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: latest
          actions-cache-folder: .xmake-cache
          build-cache: true

      - name: Run lint
        run: |
          sudo apt-get install -y fd-find
          ln -s $(which fdfind) /usr/local/bin/fd
          xmake lint

      - name: Run test
        run: xmake test:all
