name: Rust

on:
  pull_request:
    paths:
      - rs/**
      - .github/workflows/rs.yaml
  push:
    branches:
      - "**"
    paths:
      - rs/**
      - .github/workflows/rs.yaml

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: rs

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Run rustfmt
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy

      - name: Run build
        run: cargo build --verbose

      - name: Run test
        run: cargo test --verbose
